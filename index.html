<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Shredder!</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            padding: 100px 20px;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1510915361894-db8b60106cb1?q=80&w=1200');
            background-size: cover;
            min-height: 80vh;
        }
        h1 {
            color: #ff4500;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 3px 3px #000;
        }
        .birthday-text {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 40px;
        }
        .guitar-icon {
            font-size: 100px;
            margin: 20px 0;
        }
        .message-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ff4500;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            max-width: 600px;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #ff4500;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #fff;
            color: #ff4500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="guitar-icon">🎸</div>
        <h1>Rock On!</h1>
        <p class="birthday-text">Happy Birthday to the Greatest Guitarist in Dhaka!</p>
        
        <div class="message-box">
            <p>"May your strings never break, your amp always stay at 11, and your riffs stay legendary."</p>
            <p><strong>- From your best friend</strong></p>
        </div>

        <br>
        <a href="https://www.youtube.com/watch?v=xvE6O5AAbf4" target="_blank" class="btn">PLAY BIRTHDAY RIFF</a>
    </div>

    <footer style="padding: 20px; font-size: 0.8rem;">
        Built for a legend | April 2026
    </footer>

</body>
</html>
